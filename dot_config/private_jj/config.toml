[user]
name = "Tom Houlé"
email = "tom@tomhoule.com"

[templates]
git_push_bookmark = '"tomhoule-" ++ change_id.short()'
draft_commit_description = "builtin_draft_commit_description_with_diff"

[aliases]
gf = ["git", "fetch"]
no = ["new", "main@origin"]
tug = ["bookmark", "advance"]
prune-empty = ["abandon", "-r", "empty() & mutable() & ~merges()"]

[revsets]
bookmark-advance-to = "@-"

[merge-tools.mergiraf]
program = "mergiraf"
merge-args = ["merge", "$base", "$left", "$right", "-o", "$output", "--fast"]
merge-conflict-exit-codes = [1]
conflict-marker-style = "git"

[signing]
behavior = "own"
backend = "ssh"
key = "~/.ssh/id_ed25519.pub"
